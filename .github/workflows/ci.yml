name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: unp64
          - os: ubuntu-24.04-arm
            artifact_name: unp64
          - os: macos-latest
            artifact_name: unp64
          - os: windows-latest
            artifact_name: unp64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            make

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          make -C src CFG=Release

      - name: Build (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: |
          make -C src CFG=Release

      - name: Verify Executable (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          if [ ! -f "src/Release/unp64.exe" ]; then
            echo "Error: src/Release/unp64.exe was not created."
            exit 1
          fi
          ./src/Release/unp64.exe 2>&1 | grep -i "UNP64" || true
          echo "Windows build verified."

      - name: Verify Executable (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: |
          if [ ! -f "src/Release/${{ matrix.artifact_name }}" ]; then
            echo "Error: src/Release/${{ matrix.artifact_name }} was not created."
            exit 1
          fi
          ./src/Release/${{ matrix.artifact_name }} 2>&1 | grep -i "UNP64" || true
          echo "Build verified."
