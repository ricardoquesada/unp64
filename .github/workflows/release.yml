name: Release

on:
  push:
    tags:
      - "v*"
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: unp64
            asset_name: unp64-linux-amd64
          - os: ubuntu-24.04-arm
            artifact_name: unp64
            asset_name: unp64-linux-arm64
          - os: windows-latest
            artifact_name: unp64.exe
            asset_name: unp64-windows-amd64
          - os: macos-latest
            artifact_name: unp64
            asset_name: unp64-macos-universal

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          mingw32-make -C src CFG=Release

      - name: Build (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          make -C src CFG=Release

      - name: Build (macOS Universal)
        if: matrix.os == 'macos-latest'
        run: |
          # Build for x86_64
          make -C src cleanall
          make -C src CFLAGS="-std=gnu17 -arch x86_64 -O3 -pipe -Wall" LDFLAGS="-arch x86_64 -pipe"
          mv src/Release/unp64 src/unp64_x86

          # Build for arm64
          make -C src cleanall
          make -C src CFLAGS="-std=gnu17 -arch arm64 -O3 -pipe -Wall" LDFLAGS="-arch arm64 -pipe"
          mv src/Release/unp64 src/unp64_arm64

          # Combine into universal binary
          make -C src cleanall
          mkdir -p src/Release
          lipo -create -output src/Release/unp64 src/unp64_x86 src/unp64_arm64
          rm src/unp64_x86 src/unp64_arm64

      - name: Code Sign and Notarize (macOS)
        if: matrix.os == 'macos-latest'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PWD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Create and configure keychain
          security create-keychain -p "$KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain

          # Decode and import certificate
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" build.keychain

          # Get the identity (Developer ID Application)
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk -F '"' '{print $2}')

          if [ -z "$IDENTITY" ]; then
            echo "No Developer ID Application identity found. Listing all identities:"
            security find-identity -v -p codesigning
            exit 1
          fi

          echo "Signing with identity: $IDENTITY"

          # Code Sign
          /usr/bin/codesign --force --options runtime --timestamp --sign "$IDENTITY" src/Release/${{ matrix.artifact_name }} -v

          # Create zip for notarization
          zip -j notarize.zip src/Release/${{ matrix.artifact_name }}

          # Notarize
          xcrun notarytool submit notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Cleanup
          rm certificate.p12 notarize.zip

      - name: Package (tar.gz)
        if: matrix.os != 'windows-latest'
        run: |
          cp unp64.txt src/Release/
          tar -czf ${{ matrix.asset_name }}.tar.gz -C src/Release ${{ matrix.artifact_name }} unp64.txt

      - name: Package (zip)
        if: matrix.os == 'windows-latest'
        run: |
          cp unp64.txt src/Release/
          7z a ${{ matrix.asset_name }}.zip ./src/Release/${{ matrix.artifact_name }} ./src/Release/unp64.txt

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ matrix.asset_name }}.tar.gz
            ${{ matrix.asset_name }}.zip
